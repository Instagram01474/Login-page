<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow-lg p-4 rounded-4" style="width: 350px;">
    <h3 class="text-center mb-4 fw-bold">Login</h3>
    <form>
      <!-- Username -->
      <div class="mb-3">
        <label for="username" class="form-label fw-semibold">Username</label>
        <input type="text" class="form-control" id="username" placeholder="username" required>
      </div>
      <!-- Password -->
      <div class="mb-2">
        <label for="password" class="form-label fw-semibold">Password</label>
        <input type="password" class="form-control" id="password" placeholder="password" required>
      </div>

      <!-- Forgot Password Link -->
      <div class="d-flex justify-content-end mb-3">
        <a href="#" class="text-decoration-none small text-primary">Forgot Password?</a>
      </div>

      <!-- Button -->
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary btn-lg rounded-3">Login</button>
      </div>

      <!-- Sign Up Link -->
      <p class="text-center mb-0">
        Don’t have an account? 
        <a href="#" class="text-decoration-none fw-semibold text-primary">Sign Up</a>
      </p>
    </form>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
